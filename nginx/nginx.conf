events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    gzip            on;
    gzip_types      text/plain text/css application/json
                    application/javascript text/javascript;
    keepalive_timeout 65;
    client_max_body_size 10M;

    limit_req_zone $binary_remote_addr zone=chat_limit:10m  rate=20r/m;
    limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=60r/m;

    upstream chat_backend  { server chat_api:8000;  }
    upstream admin_backend { server admin_api:8001; }


    # ══════════════════════════════════════════════════════════════════════════
    # HTTP — active by default for local Docker testing
    # When SSL is ready: comment out this entire block and uncomment HTTPS below
    # ══════════════════════════════════════════════════════════════════════════
    server {
        listen 80;
        server_name _;

        # Chat API — strips /api/chat/ prefix, forwards as /chat/
        # proxy_buffering off is required for SSE streaming to work
        location /api/chat/ {
            limit_req zone=chat_limit burst=10 nodelay;

            proxy_pass         http://chat_backend/chat/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        '';
            proxy_read_timeout 120s;
            proxy_buffering    off;
            proxy_cache        off;
            chunked_transfer_encoding on;

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin  * always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Content-Type, Authorization, x-admin-token" always;
                return 204;
            }
        }

        # Admin API — strips /api/admin/ prefix, forwards as /admin/
        location /api/admin/ {
            limit_req zone=admin_limit burst=20 nodelay;

            proxy_pass         http://admin_backend/admin/;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin  * always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Content-Type, Authorization, x-admin-token" always;
                return 204;
            }
        }

        # Admin panel static files — must come before / location
        location /admin/ {
            alias     /usr/share/nginx/admin/;
            index     index.html;
            try_files $uri $uri/ /admin/index.html;
        }

        # Chat widget static files
        location / {
            root      /usr/share/nginx/html;
            index     index.html;
            try_files $uri $uri/ /index.html;
        }

        # Health check
        location /health {
            proxy_pass http://chat_backend/health;
        }
    }


